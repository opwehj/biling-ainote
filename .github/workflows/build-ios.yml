# =============================================================================
# 笔灵 BiLing — iOS 构建（EAS Build Local 模式）
# =============================================================================

name: Build iOS IPA

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.0.app
          xcodebuild -version

      - name: 📦 Install deps
        run: npm install --legacy-peer-deps

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🔨 EAS Build (local)
        run: |
          npx eas build --platform ios --profile preview --local \
            --output ./BiLing.ipa --wait 2>&1 | tail -150
        env:
          EAS_BUILD: "true"

      - name: 📎 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BiLing-TrollStore
          path: BiLing.ipa
          retention-days: 30

      - name: 📎 Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/eas-build-*.log
            ios/build/**/*.log
          retention-days: 7
