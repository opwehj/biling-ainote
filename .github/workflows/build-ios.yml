name: Build iOS IPA
on:
  push:
    tags: ['v*']
  workflow_dispatch:
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          sudo xcode-select -s /Applications/Xcode_26.3.0.app
          xcodebuild -version
      - run: npm install --legacy-peer-deps
      - run: npx expo prebuild --platform ios --clean
      - name: Pod install
        run: cd ios && pod install --repo-update
      - name: Fix Swift & signing
        run: |
          cd ios
          ruby -e '
            require "xcodeproj"
            pods = Xcodeproj::Project.open("Pods/Pods.xcodeproj")
            pods.targets.each do |t|
              next unless t.name == "ExpoModulesJSI"
              t.build_phases.delete_if { |p| p.respond_to?(:name) && p.name&.include?("Build ExpoModulesJSI") }
            end
            pods.targets.each do |t|
              if t.name.to_s.start_with?("Expo")
                t.build_configurations.each { |c| c.build_settings["SWIFT_VERSION"] = "5.0" }
              end
            end
            pods.save
            main = Xcodeproj::Project.open("BiLing.xcodeproj")
            main.targets.each do |t|
              t.build_configurations.each do |c|
                ["CODE_SIGNING_ALLOWED","CODE_SIGNING_REQUIRED","CODE_SIGNING_SUPPORTED"].each { |k| c.build_settings[k] = "NO" }
                ["CODE_SIGN_IDENTITY","DEVELOPMENT_TEAM","PROVISIONING_PROFILE_SPECIFIER","PROVISIONING_PROFILE"].each { |k| c.build_settings[k] = "" }
              end
            end
            main.save
          '
      - name: Build
        run: |
          cd ios
          xcodebuild build -workspace BiLing.xcworkspace -scheme BiLing -configuration Debug -destination "generic/platform=iOS" -derivedDataPath ./build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" > build_output.log 2>&1 || FAIL=1
          if [ "$FAIL" = "1" ]; then tail -400 build_output.log; exit 1; fi
      - name: Package IPA
        run: |
          cd ios
          APP=$(find build -name "BiLing.app" -type d | head -1)
          [ -z "$APP" ] && { echo "No .app"; exit 1; }
          mkdir -p Payload && cp -r "$APP" Payload/
          zip -ry "BiLing-TrollStore.ipa" Payload && mv "BiLing-TrollStore.ipa" ../ && ls -lh ../BiLing-TrollStore.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: BiLing-TrollStore
          path: BiLing-TrollStore.ipa
          retention-days: 30
