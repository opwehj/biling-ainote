name: Build iOS IPA
on:
  push:
    tags: ['v*']
  workflow_dispatch:
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - run: npx expo prebuild --platform ios --clean
      - name: Install Pods
        run: cd ios && pod install --repo-update
      - name: Init EAS project
        run: npx eas-cli init --non-interactive --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: EAS Build (local)
        run: npx eas-cli build --platform ios --profile preview --local --output ./BiLing.ipa --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: BiLing-TrollStore
          path: BiLing.ipa
          retention-days: 30
