# =============================================================================
# 笔灵 BiLing — iOS 构建（TrollStore 免签名版）
# =============================================================================
# 使用 Xcode 26.3 以匹配 Expo SDK 56 的 Swift 版本（6.3.1）
# =============================================================================

name: Build iOS IPA (TrollStore)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Select Xcode 26.3
        run: |
          echo "可用 Xcode:"
          ls -d /Applications/Xcode*.app 2>/dev/null
          echo "选择: /Applications/Xcode_26.3.0.app"
          sudo xcode-select -s /Applications/Xcode_26.3.0.app
          echo "== Xcode 版本 =="
          xcodebuild -version
          echo "== Swift 版本 =="
          swift --version

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Expo prebuild
        run: npx expo prebuild --platform ios --clean

      - name: 📦 Install Pods
        run: |
          cd ios
          pod install --repo-update

      - name: 🔓 Disable code signing
        run: |
          cd ios
          ruby -e '
            require "xcodeproj"
            proj = Xcodeproj::Project.open("BiLing.xcodeproj")
            proj.targets.each do |t|
              t.build_configurations.each do |c|
                c.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
                c.build_settings["CODE_SIGNING_REQUIRED"] = "NO"
                c.build_settings["CODE_SIGNING_SUPPORTED"] = "NO"
                c.build_settings["CODE_SIGN_IDENTITY"] = ""
                c.build_settings["DEVELOPMENT_TEAM"] = ""
                c.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ""
                c.build_settings["PROVISIONING_PROFILE"] = ""
              end
            end
            proj.save
          '
          echo "✅ 代码签名已禁用"

      - name: 🔨 Build (unsigned)
        run: |
          cd ios
          xcodebuild build \
            -workspace BiLing.xcworkspace \
            -scheme BiLing \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            > build_output.log 2>&1 || BUILD_FAILED=1
          if [ "$BUILD_FAILED" = "1" ]; then
            echo "❌ BUILD FAILED - 最后300行日志:"
            tail -300 build_output.log
            exit 1
          fi
          echo "✅ BUILD SUCCEEDED: $(tail -1 build_output.log)"

      - name: 📦 Package IPA
        run: |
          cd ios
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app"
            exit 1
          fi
          APP_SIZE=$(du -sm "$APP_PATH" | awk '{print $1}')
          echo "App: $APP_PATH ($APP_SIZE MB)"
          rm -rf Payload && mkdir Payload
          cp -r "$APP_PATH" Payload/
          IPA="BiLing-${GITHUB_REF_NAME:-${GITHUB_RUN_NUMBER}}.ipa"
          zip -ry "$IPA" Payload
          mv "$IPA" ../
          ls -lh ../"$IPA"

      - name: 📎 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BiLing-TrollStore
          path: BiLing-*.ipa
          retention-days: 30

      - name: 📎 Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ios/build_output.log
          retention-days: 7
